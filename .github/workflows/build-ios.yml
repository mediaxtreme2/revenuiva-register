name: Build iOS & Upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Setup API Key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_UPZZZQT35C.p8

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create Keychain
        run: |
          security create-keychain -p "actions" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "actions" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)

      - name: Setup Fastlane & Build
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)
          platform :ios do
            lane :build_and_upload do
              setup_ci

              api_key = app_store_connect_api_key(
                key_id: "UPZZZQT35C",
                issuer_id: "a617b860-c739-45d9-b2c2-bb7a2a6f02a3",
                key_filepath: File.expand_path("~/private_keys/AuthKey_UPZZZQT35C.p8")
              )

              get_certificates(
                api_key: api_key,
                team_id: "DBJC3A73UV",
                platform: "ios"
              )

              get_provisioning_profile(
                api_key: api_key,
                app_identifier: "com.revenuivaai.register",
                team_id: "DBJC3A73UV"
              )

              update_code_signing_settings(
                use_automatic_signing: false,
                path: "ios/RevenuivaAI.xcodeproj",
                team_id: "DBJC3A73UV",
                bundle_identifier: "com.revenuivaai.register",
                profile_name: ENV["sigh_com.revenuivaai.register_appstore_profile-name"]
              )

              build_app(
                workspace: "ios/RevenuivaAI.xcworkspace",
                scheme: "RevenuivaAI",
                export_method: "app-store",
                output_directory: "./build",
                output_name: "RevenuivaAI.ipa",
                export_options: {
                  signingStyle: "manual",
                  teamID: "DBJC3A73UV"
                }
              )

              upload_to_testflight(
                api_key: api_key,
                skip_waiting_for_build_processing: true,
                skip_submission: true
              )
            end
          end
          RUBY

          fastlane ios build_and_upload

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
