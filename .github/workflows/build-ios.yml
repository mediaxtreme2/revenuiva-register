name: Build iOS & Upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Setup API Key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_UPZZZQT35C.p8

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Install Fastlane
        run: gem install fastlane

      - name: Revoke oldest distribution cert if at limit
        run: |
          # Generate JWT for App Store Connect API
          ruby -e '
          require "jwt"
          require "json"
          require "net/http"
          require "uri"

          key_file = File.expand_path("~/private_keys/AuthKey_UPZZZQT35C.p8")
          private_key = OpenSSL::PKey::EC.new(File.read(key_file))

          header = { kid: "UPZZZQT35C" }
          now = Time.now.to_i
          payload = {
            iss: "a617b860-c739-45d9-b2c2-bb7a2a6f02a3",
            iat: now,
            exp: now + 1200,
            aud: "appstoreconnect-v1"
          }

          token = JWT.encode(payload, private_key, "ES256", header)

          # List certificates
          uri = URI("https://api.appstoreconnect.apple.com/v1/certificates")
          http = Net::HTTP.new(uri.host, uri.port)
          http.use_ssl = true
          req = Net::HTTP::Get.new(uri)
          req["Authorization"] = "Bearer #{token}"
          resp = http.request(req)
          data = JSON.parse(resp.body)

          certs = data["data"].select { |c|
            ["IOS_DISTRIBUTION", "DISTRIBUTION"].include?(c["attributes"]["certificateType"])
          }

          puts "Found #{certs.length} iOS distribution certificate(s)"
          certs.each { |c| puts "  - #{c["id"]}: #{c["attributes"]["name"]} (#{c["attributes"]["certificateType"]})" }

          # Revoke ALL distribution certs - we have no private keys for any of them
          # Fastlane will create a fresh one with a key we control
          certs.each do |c|
            puts "Revoking certificate: #{c["id"]} (#{c["attributes"]["name"]})"
            del_uri = URI("https://api.appstoreconnect.apple.com/v1/certificates/#{c["id"]}")
            del_req = Net::HTTP::Delete.new(del_uri)
            del_req["Authorization"] = "Bearer #{token}"
            del_resp = http.request(del_req)
            puts "  -> Response: #{del_resp.code}"
          end
          puts "All distribution certs revoked. Fastlane will create a fresh one."

          # Create App ID if it does not exist
          bid_uri = URI("https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]=com.revenuivaai.register")
          bid_req = Net::HTTP::Get.new(bid_uri)
          bid_req["Authorization"] = "Bearer #{token}"
          bid_resp = http.request(bid_req)
          bid_data = JSON.parse(bid_resp.body)

          if bid_data["data"].empty?
            puts "Creating App ID com.revenuivaai.register..."
            create_uri = URI("https://api.appstoreconnect.apple.com/v1/bundleIds")
            create_req = Net::HTTP::Post.new(create_uri)
            create_req["Authorization"] = "Bearer #{token}"
            create_req["Content-Type"] = "application/json"
            create_req.body = JSON.generate({
              data: {
                type: "bundleIds",
                attributes: {
                  identifier: "com.revenuivaai.register",
                  name: "RevenuivaAI Register",
                  platform: "IOS"
                }
              }
            })
            create_resp = http.request(create_req)
            puts "App ID creation response: #{create_resp.code}"
            puts create_resp.body if create_resp.code.to_i >= 400
          else
            puts "App ID com.revenuivaai.register already exists"
          end

          # Get the bundle ID resource id for App Store Connect app creation
          bid_resp2 = http.request(bid_req)
          bid_data2 = JSON.parse(bid_resp2.body)
          bundle_id_resource = bid_data2["data"].first
          bundle_resource_id = bundle_id_resource["id"]
          puts "Bundle ID resource: #{bundle_resource_id}"

          # Check if app exists on App Store Connect
          apps_uri = URI("https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=com.revenuivaai.register")
          apps_req = Net::HTTP::Get.new(apps_uri)
          apps_req["Authorization"] = "Bearer #{token}"
          apps_resp = http.request(apps_req)
          apps_data = JSON.parse(apps_resp.body)

          if apps_data["data"].empty?
            puts "Creating app on App Store Connect..."
            app_uri = URI("https://api.appstoreconnect.apple.com/v1/apps")
            app_req = Net::HTTP::Post.new(app_uri)
            app_req["Authorization"] = "Bearer #{token}"
            app_req["Content-Type"] = "application/json"
            app_req.body = JSON.generate({
              data: {
                type: "apps",
                attributes: {
                  name: "RevenuivaAI",
                  primaryLocale: "en-US",
                  bundleId: "com.revenuivaai.register",
                  sku: "com.revenuivaai.register"
                },
                relationships: {
                  bundleId: {
                    data: { type: "bundleIds", id: bundle_resource_id }
                  }
                }
              }
            })
            app_resp = http.request(app_req)
            puts "App creation response: #{app_resp.code}"
            if app_resp.code.to_i >= 400
              puts app_resp.body
            else
              puts "App created on App Store Connect!"
            end
          else
            puts "App already exists on App Store Connect"
          end
          '

      - name: Build and Upload via Fastlane
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)
          platform :ios do
            lane :build_and_upload do
              keychain_name = "build_keychain"
              keychain_password = "actions"

              create_keychain(
                name: keychain_name,
                password: keychain_password,
                default_keychain: true,
                unlock: true,
                timeout: 3600,
                lock_when_sleeps: false
              )

              api_key = app_store_connect_api_key(
                key_id: "UPZZZQT35C",
                issuer_id: "a617b860-c739-45d9-b2c2-bb7a2a6f02a3",
                key_filepath: File.expand_path("~/private_keys/AuthKey_UPZZZQT35C.p8")
              )

              get_certificates(
                api_key: api_key,
                team_id: "DBJC3A73UV",
                platform: "ios",
                keychain_path: File.expand_path("~/Library/Keychains/#{keychain_name}-db"),
                keychain_password: keychain_password
              )

              get_provisioning_profile(
                api_key: api_key,
                app_identifier: "com.revenuivaai.register",
                team_id: "DBJC3A73UV"
              )

              profile_uuid = lane_context[SharedValues::SIGH_UDID]

              update_code_signing_settings(
                use_automatic_signing: false,
                path: "ios/RevenuivaAI.xcodeproj",
                team_id: "DBJC3A73UV",
                bundle_identifier: "com.revenuivaai.register",
                code_sign_identity: "iPhone Distribution",
                profile_uuid: profile_uuid
              )

              build_app(
                workspace: "ios/RevenuivaAI.xcworkspace",
                scheme: "RevenuivaAI",
                export_method: "app-store",
                output_directory: "./build",
                output_name: "RevenuivaAI.ipa",
                xcargs: "DEVELOPMENT_TEAM=DBJC3A73UV",
                export_options: {
                  signingStyle: "manual",
                  teamID: "DBJC3A73UV",
                  provisioningProfiles: {
                    "com.revenuivaai.register" => ENV["sigh_com.revenuivaai.register_appstore_profile-name"]
                  }
                }
              )
            end
          end
          RUBY

          fastlane ios build_and_upload

      - name: Upload to TestFlight
        continue-on-error: true
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)
          platform :ios do
            lane :upload do
              api_key = app_store_connect_api_key(
                key_id: "UPZZZQT35C",
                issuer_id: "a617b860-c739-45d9-b2c2-bb7a2a6f02a3",
                key_filepath: File.expand_path("~/private_keys/AuthKey_UPZZZQT35C.p8")
              )
              upload_to_testflight(
                api_key: api_key,
                ipa: "./build/RevenuivaAI.ipa",
                skip_waiting_for_build_processing: true,
                skip_submission: true
              )
            end
          end
          RUBY

          fastlane ios upload

      - name: Create GitHub Release with IPA
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.3-ios
          name: RevenuivaAI v2.0.3 (iOS)
          body: |
            RevenuivaAI v2.0.3 - iOS (Stripe Tap to Pay)

            - Stripe Terminal NFC Tap to Pay
            - RevenuivaAI site-icon logo
            - Same features as Android edition
          files: build/RevenuivaAI.ipa
          make_latest: false

      - name: Cleanup
        if: always()
        run: security delete-keychain build_keychain 2>/dev/null || true
