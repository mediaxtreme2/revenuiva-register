name: Build iOS & Upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Setup API Key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_UPZZZQT35C.p8

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Install Fastlane
        run: gem install fastlane

      - name: Build and Upload via Fastlane
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)
          platform :ios do
            lane :build_and_upload do
              keychain_name = "build_keychain"
              keychain_password = "actions"

              create_keychain(
                name: keychain_name,
                password: keychain_password,
                default_keychain: true,
                unlock: true,
                timeout: 3600,
                lock_when_sleeps: false
              )

              api_key = app_store_connect_api_key(
                key_id: "UPZZZQT35C",
                issuer_id: "a617b860-c739-45d9-b2c2-bb7a2a6f02a3",
                key_filepath: File.expand_path("~/private_keys/AuthKey_UPZZZQT35C.p8")
              )

              # Revoke oldest iOS Distribution cert to make room for a new one
              UI.message("Checking existing distribution certificates...")
              require 'spaceship'
              Spaceship::ConnectAPI.token = api_key
              certs = Spaceship::ConnectAPI::Certificate.all.select { |c|
                c.certificate_type == "IOS_DISTRIBUTION" || c.certificate_type == "DISTRIBUTION"
              }
              UI.message("Found #{certs.length} distribution certificate(s)")
              if certs.length >= 2
                oldest = certs.min_by { |c| c.id }
                UI.message("Revoking certificate #{oldest.id} to make room...")
                oldest.delete!
                UI.success("Revoked certificate #{oldest.id}")
              end

              get_certificates(
                api_key: api_key,
                team_id: "DBJC3A73UV",
                platform: "ios",
                keychain_path: File.expand_path("~/Library/Keychains/#{keychain_name}-db"),
                keychain_password: keychain_password
              )

              get_provisioning_profile(
                api_key: api_key,
                app_identifier: "com.revenuivaai.register",
                team_id: "DBJC3A73UV"
              )

              profile_uuid = lane_context[SharedValues::SIGH_UDID]

              update_code_signing_settings(
                use_automatic_signing: false,
                path: "ios/RevenuivaAI.xcodeproj",
                team_id: "DBJC3A73UV",
                bundle_identifier: "com.revenuivaai.register",
                code_sign_identity: "iPhone Distribution",
                profile_uuid: profile_uuid
              )

              build_app(
                workspace: "ios/RevenuivaAI.xcworkspace",
                scheme: "RevenuivaAI",
                export_method: "app-store",
                output_directory: "./build",
                output_name: "RevenuivaAI.ipa",
                xcargs: "DEVELOPMENT_TEAM=DBJC3A73UV",
                export_options: {
                  signingStyle: "manual",
                  teamID: "DBJC3A73UV",
                  provisioningProfiles: {
                    "com.revenuivaai.register" => ENV["sigh_com.revenuivaai.register_appstore_profile-name"]
                  }
                }
              )

              upload_to_testflight(
                api_key: api_key,
                skip_waiting_for_build_processing: true,
                skip_submission: true
              )
            end
          end
          RUBY

          fastlane ios build_and_upload

      - name: Cleanup
        if: always()
        run: security delete-keychain build_keychain 2>/dev/null || true
