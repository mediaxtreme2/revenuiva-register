name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx6g -XX:+UseParallelGC
        run: |
          printf '\n' >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk RevenuivaAI-v2.1.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-android
          name: RevenuivaAI v2.1.0 (Android)
          body: |
            RevenuivaAI v2.1.0 — Multi-Tenant White-Glove

            - NEW: 6-digit Device Sync PIN activation on first launch
            - NEW: Dynamic per-practice skin (logo, colors, name) via server config
            - NEW: Practice-specific API endpoint resolved at activation
            - Single master binary — no per-practice recompile
            - Stripe Tap to Pay NFC working
          files: RevenuivaAI-v2.1.0.apk
          make_latest: true
