name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk RevenuivaAI-Register-v1.1.1.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.1-android
          name: RevenuivaAI Register v1.1.1 (Android) - Error Screen Fix
          body: |
            RevenuivaAI Register v1.1.1 - Error Message Persistence

            Fixes:
            - Error screen now stays visible until manually dismissed
            - Added phaseRef to prevent stale closure state overrides
            - 30-second error lock prevents any background state changes
            - Polling completely blocked during error/tapping/success phases
          files: RevenuivaAI-Register-v1.1.1.apk
          make_latest: true
